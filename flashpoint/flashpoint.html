    <script>
        function swap() {
            if (event.keyCode == 37 && event.keyCode != 33 && event.keyCode != 38)
                left(-1);
            else if (event.keyCode == 39 && event.keyCode != 34 && event.keyCode != 40)
                left(1);
        }

        function sole() {
            document.getElementById("full").style.display = "none";
            document.getElementById("sole").style.display = "block";
        }

        function full() {
            document.getElementById("full").style.display = "block";
            document.getElementById("sole").style.display = "none";
        }

        function left(num) {
            var s = document.getElementById('pic').alt;
            if (s == "Flashpoint-000" && num == -1) {
                alert("已是第一页！");
            } else if (s == "zWater" && num == 1) {
                alert("已是最后一页！");
            } else {
                var index = document.getElementById("page").selectedIndex;
                document.getElementById("page").options[index + num].selected = true;
                pagec();
            }
        }

        function pagec() {
            var s = document.getElementById("page").value;
            if (s == "z") {
                document.getElementById('pic').src = "zWater.jpg";
                document.getElementById('pic').alt = "zWater";
            } else {
                document.getElementById('pic').src = "Flashpoint-" + s + ".jpg";
                document.getElementById('pic').alt = "Flashpoint-" + s;
            }
        }
    </script>
